<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Flow Pro - Pale Edition</title>
    <style>
        /* --- 变量定义 --- */
        :root {
            /* 深色模式 */
            --bg-color: #080808; 
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --card-inner-glow: rgba(255, 255, 255, 0.03);
            --text-main: #ffffff;
            --text-muted: rgba(255, 255, 255, 0.6);
            --btn-bg: #ffffff;
            --btn-text: #000000;
            --btn-sec-bg: rgba(255, 255, 255, 0.08);
            --btn-sec-border: rgba(255, 255, 255, 0.12);
            --btn-sec-hover: rgba(255, 255, 255, 0.12);
            --noise-opacity: 0.04;
            --noise-filter: none;
            --canvas-mix: screen; 
            /* 调整：比之前稍微降低一点透明度，配合低饱和度颜色 */
            --canvas-opacity: 0.5; 
        }

        /* 亮色模式变量覆盖 */
        [data-theme="light"] {
            --bg-color: #F8F8FC; /* 背景更白更亮 */
            --card-bg: rgba(255, 255, 255, 0.65);
            --card-border: rgba(255, 255, 255, 0.6);
            --card-inner-glow: rgba(255, 255, 255, 0.5);
            --text-main: #1d1d1f;
            --text-muted: rgba(60, 60, 67, 0.6);
            --btn-bg: #1d1d1f;
            --btn-text: #ffffff;
            --btn-sec-bg: rgba(0, 0, 0, 0.05);
            --btn-sec-border: rgba(0, 0, 0, 0.05);
            --btn-sec-hover: rgba(0, 0, 0, 0.1);
            --noise-opacity: 0.03; 
            --noise-filter: none; 
            --canvas-mix: multiply;
            /* 亮色模式下颜色很淡，所以透明度稍微保留 */
            --canvas-opacity: 0.35; 
        }

        /* --- 基础设置 --- */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            color: var(--text-main);
            overscroll-behavior: none; 
            transition: background-color 0.8s cubic-bezier(0.32, 0.72, 0, 1), color 0.8s ease;
        }

        /* --- 视觉核心层 --- */
        
        #canvas-wrapper {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 1;
            /* 关键修改：降低饱和度 (0.85)，增加模糊 (70px)，轻微提升亮度 */
            /* 让颜色看起来有一种"褪色"的高级感 */
            filter: blur(70px) saturate(0.85) brightness(1.1);
            transform: translate3d(0,0,0) scale(1.1); 
            opacity: var(--canvas-opacity);
            transition: opacity 1s ease;
            pointer-events: none;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
        }

        .noise-overlay {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            z-index: 2;
            pointer-events: none;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='1'/%3E%3C/svg%3E");
            background-size: 150px 150px; 
            opacity: var(--noise-opacity);
            filter: var(--noise-filter);
            transition: opacity 0.5s ease;
        }

        /* --- UI 层 --- */
        .ui-layer {
            position: relative;
            z-index: 10;
            width: 100%; height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 24px;
        }

        .glass-card {
            position: relative;
            background: var(--card-bg);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid var(--card-border);
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 
                0 40px 80px rgba(0, 0, 0, 0.1), 
                inset 0 0 0 1px var(--card-inner-glow);
            border-radius: 32px;
            padding: 48px;
            width: 100%;
            max-width: 480px;
            text-align: left;
            overflow: hidden;
            transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            will-change: transform;
        }

        .glass-card:hover {
            transform: translateY(-5px) scale(1.005);
        }

        .meta-tag {
            display: inline-flex;
            align-items: center;
            padding: 6px 12px;
            background: rgba(125, 125, 125, 0.1);
            border-radius: 100px;
            font-size: 11px;
            font-weight: 600;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: var(--text-main);
            margin-bottom: 24px;
            border: 1px solid var(--card-border);
        }

        h1 {
            font-size: 42px;
            font-weight: 700;
            letter-spacing: -1.5px;
            line-height: 1.1;
            margin-bottom: 16px;
            color: var(--text-main);
        }

        p {
            font-size: 17px;
            line-height: 1.6;
            color: var(--text-muted);
            margin-bottom: 40px;
            font-weight: 400;
        }

        .btn-group {
            display: flex;
            gap: 12px;
            flex-wrap: wrap; 
        }

        button {
            padding: 16px 24px;
            border-radius: 18px;
            border: none;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.3s ease;
            flex: 1;
            white-space: nowrap;
        }

        .btn-secondary {
            background: var(--btn-sec-bg);
            color: var(--text-main);
            border: 1px solid var(--btn-sec-border);
        }

        .btn-secondary:hover {
            background: var(--btn-sec-hover);
        }

        @media (max-width: 600px) {
            .glass-card { padding: 32px; }
            h1 { font-size: 32px; }
            .btn-group { gap: 10px; }
            button { padding: 14px 16px; font-size: 13px; }
        }

    </style>
</head>
<body data-theme="dark">

    <div id="canvas-wrapper">
        <canvas id="meshCanvas"></canvas>
    </div>
    <div class="noise-overlay"></div>

    <div class="ui-layer">
        <div class="glass-card">
            <div class="content-wrap">
                <div class="meta-tag">Pale Edition</div>
                <h1>Ethereal<br>Pale Flow</h1>
                <p>调整了色彩算法，降低饱和度并提升亮度，呈现出如水彩般清淡、雅致的视觉效果。它足够明显，却不刺眼。</p>
                
                <div class="btn-group">
                    <button class="btn-secondary" id="themeBtn">切换亮色</button>
                    <button class="btn-secondary" id="pauseBtn">暂停</button>
                </div>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('meshCanvas');
        const ctx = canvas.getContext('2d', { alpha: true });
        const themeBtn = document.getElementById('themeBtn');
        const body = document.body;
        
        let width, height;
        let animationId;
        let isPaused = false;
        let isDark = true;
        
        // 性能优化：20% 分辨率
        const RES_SCALE = 0.2; 
        
        let currentMixMode = 'screen';

        const mouse = { x: -1000, y: -1000, active: false };

        // 调整为淡雅色板：饱和度(s)降低至 50-60%，亮度(l)保持在 65-75%
        const palettes = [
            // Pale Blue (淡蓝)
            [ { h: 210, s: 60, l: 70 }, { h: 240, s: 50, l: 65 }, { h: 190, s: 60, l: 70 }, { h: 280, s: 40, l: 70 } ],
            // Pale Sunset (淡夕阳/杏色)
            [ { h: 350, s: 60, l: 70 }, { h: 30, s: 60, l: 75 }, { h: 280, s: 40, l: 65 }, { h: 40, s: 50, l: 70 } ],
            // Pale Aurora (淡极光/薄荷)
            [ { h: 160, s: 50, l: 65 }, { h: 130, s: 40, l: 70 }, { h: 200, s: 60, l: 70 }, { h: 220, s: 50, l: 70 } ],
            // Lavender Mist (薰衣草雾)
            [ { h: 260, s: 40, l: 70 }, { h: 300, s: 40, l: 70 }, { h: 220, s: 50, l: 75 }, { h: 280, s: 30, l: 70 } ]
        ];

        let currentPaletteIndex = 0;
        let blobs = [];

        // 辅助函数：线性插值
        function lerp(start, end, factor) {
            return start + (end - start) * factor;
        }

        class Blob {
            constructor(colorData) {
                // 当前显示的颜色
                this.color = { ...colorData };
                // 目标颜色（用于过渡）
                this.targetColor = { ...colorData };
                
                this.init();
            }

            init() {
                this.x = Math.random() * window.innerWidth;
                this.y = Math.random() * window.innerHeight;
                const minDim = Math.min(window.innerWidth, window.innerHeight);
                this.radius = minDim * (0.4 + Math.random() * 0.4); 
                
                // 速度适中
                const speedFactor = 0.8;
                this.vx = (Math.random() - 0.5) * 2 * speedFactor;
                this.vy = (Math.random() - 0.5) * 2 * speedFactor;
                
                this.angleX = Math.random() * Math.PI * 2;
                this.angleY = Math.random() * Math.PI * 2;
                this.freqX = 0.0005 + Math.random() * 0.001;
                this.freqY = 0.0005 + Math.random() * 0.001;
                this.scalePhase = Math.random() * Math.PI * 2;
            }

            // 设置新的目标颜色
            setTargetColor(newColor) {
                this.targetColor = { ...newColor };
            }

            update() {
                // 颜色变化速度
                const lerpSpeed = 0.005;
                this.color.h = lerp(this.color.h, this.targetColor.h, lerpSpeed);
                this.color.s = lerp(this.color.s, this.targetColor.s, lerpSpeed);
                this.color.l = lerp(this.color.l, this.targetColor.l, lerpSpeed);

                this.angleX += this.freqX;
                this.angleY += this.freqY;
                this.x += Math.cos(this.angleX) * 1.5 + this.vx;
                this.y += Math.sin(this.angleY) * 1.5 + this.vy;

                if (mouse.active) {
                    const dx = mouse.x - this.x;
                    const dy = mouse.y - this.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    const interactRadius = window.innerWidth * 0.4;
                    if (dist < interactRadius) {
                        const force = (interactRadius - dist) / interactRadius;
                        this.x -= dx * force * 0.02;
                        this.y -= dy * force * 0.02;
                    }
                }

                const screenW = window.innerWidth;
                const screenH = window.innerHeight;
                const padding = -this.radius * 0.5;
                
                if (this.x < padding) this.vx += 0.02;
                if (this.x > screenW - padding) this.vx -= 0.02;
                if (this.y < padding) this.vy += 0.02;
                if (this.y > screenH - padding) this.vy -= 0.02;

                const maxSpeed = 1.5;
                this.vx = Math.max(Math.min(this.vx, maxSpeed), -maxSpeed);
                this.vy = Math.max(Math.min(this.vy, maxSpeed), -maxSpeed);

                this.scalePhase += 0.003;
                this.currentRadius = this.radius * (1 + Math.sin(this.scalePhase) * 0.1);
            }

            draw() {
                ctx.beginPath();
                const gradient = ctx.createRadialGradient(
                    this.x, this.y, 0,
                    this.x, this.y, this.currentRadius
                );

                const { h, s, l } = this.color;
                
                // 绘制时的亮度调整：
                // 即使是深色模式，也保持较高的亮度，配合低饱和度，形成"淡色"效果
                // 亮色模式下，稍微压一点亮度以防在白色背景上完全不可见
                let drawL = l;
                if (!isDark) {
                    drawL = Math.max(l - 5, 50); 
                }

                gradient.addColorStop(0, `hsla(${h}, ${s}%, ${drawL}%, 1)`);
                gradient.addColorStop(1, `hsla(${h}, ${s}%, ${drawL}%, 0)`);

                ctx.fillStyle = gradient;
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.scale(1 + Math.sin(this.angleX)*0.1, 1 + Math.cos(this.angleY)*0.1);
                ctx.translate(-this.x, -this.y);
                ctx.arc(this.x, this.y, this.currentRadius, 0, Math.PI * 2);
                ctx.fill();
                ctx.restore();
            }
        }

        function updateThemeConfig() {
            const styles = getComputedStyle(document.documentElement);
            currentMixMode = styles.getPropertyValue('--canvas-mix').trim();
        }

        function init() {
            resize();
            createBlobs();
            updateThemeConfig();
            startAutoColorCycle();
            animate();
        }

        function createBlobs() {
            blobs = [];
            const colors = palettes[currentPaletteIndex];
            for (let i = 0; i < 5; i++) {
                const color = { ...colors[i % colors.length] };
                blobs.push(new Blob(color));
            }
        }

        function startAutoColorCycle() {
            setInterval(() => {
                if (isPaused) return;
                currentPaletteIndex = (currentPaletteIndex + 1) % palettes.length;
                const nextPalette = palettes[currentPaletteIndex];
                blobs.forEach((blob, index) => {
                    const nextColor = nextPalette[index % nextPalette.length];
                    blob.setTargetColor(nextColor);
                });
            }, 8000); 
        }

        function resize() {
            width = Math.ceil(window.innerWidth * RES_SCALE);
            height = Math.ceil(window.innerHeight * RES_SCALE);
            canvas.width = width;
            canvas.height = height;
            ctx.scale(RES_SCALE, RES_SCALE);
        }

        function animate() {
            if (!isPaused) {
                ctx.clearRect(0, 0, window.innerWidth, window.innerHeight);
                ctx.globalCompositeOperation = currentMixMode || 'hard-light';

                blobs.forEach(blob => {
                    blob.update();
                    blob.draw();
                });
            }
            animationId = requestAnimationFrame(animate);
        }

        window.addEventListener('resize', () => {
            resize();
            blobs.forEach(b => b.init()); 
        });

        window.addEventListener('mousemove', (e) => {
            mouse.active = true;
            mouse.x = e.clientX;
            mouse.y = e.clientY;
        });

        window.addEventListener('mouseleave', () => { mouse.active = false; });
        window.addEventListener('touchmove', (e) => {
            e.preventDefault();
            mouse.active = true;
            mouse.x = e.touches[0].clientX;
            mouse.y = e.touches[0].clientY;
        }, { passive: false });

        document.getElementById('pauseBtn').addEventListener('click', (e) => {
            isPaused = !isPaused;
            e.target.textContent = isPaused ? "继续" : "暂停";
        });

        themeBtn.addEventListener('click', () => {
            isDark = !isDark;
            body.setAttribute('data-theme', isDark ? 'dark' : 'light');
            themeBtn.textContent = isDark ? "切换亮色" : "切换深色";
            
            const wrapper = document.getElementById('canvas-wrapper');
            // 切换不透明度
            wrapper.style.opacity = isDark ? 0.5 : 0.35;

            setTimeout(updateThemeConfig, 0);
        });

        init();

    </script>
</body>
</html>
